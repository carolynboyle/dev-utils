# =============================================================================
# pgAdmin 4 - Hardened Compose File
# =============================================================================
#
# Security measures applied:
#   - Read-only root filesystem
#   - /tmp and /run mounted as tmpfs (required for runtime writes)
#   - All Linux capabilities dropped
#   - no-new-privileges prevents privilege escalation
#   - Memory and CPU limits contain blast radius if compromised
#   - Named network isolates container from default bridge
#   - Port bound to configured interface only (Tailscale recommended)
#   - Credentials loaded from .env file (not hardcoded here)
#   - Image unpinned intentionally -- see README Security section
#
# =============================================================================

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # Network: bind to configured interface only
    # -------------------------------------------------------------------------
    ports:
      - "${PGADMIN_BIND_IP}:5050:80"
    networks:
      - pgadmin_net

    # -------------------------------------------------------------------------
    # Filesystem hardening
    # -------------------------------------------------------------------------
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /run:mode=755,uid=5050,gid=5050

    # -------------------------------------------------------------------------
    # Persistent data -- pgAdmin config and state survive container recreation
    # -------------------------------------------------------------------------
    volumes:
      - pgadmin_data:/var/lib/pgadmin

    # -------------------------------------------------------------------------
    # Capability and privilege hardening
    # -------------------------------------------------------------------------
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # -------------------------------------------------------------------------
    # Resource limits -- contain blast radius, prevent host starvation
    # -------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

    # -------------------------------------------------------------------------
    # Environment
    # -------------------------------------------------------------------------
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
      PGADMIN_LISTEN_PORT: 80

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgadmin_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  pgadmin_net:
    driver: bridge