# pxkit.yaml - pxkit default configuration
#
# This file ships with pxkit and provides defaults.
# To override, create ~/.config/pxkit/pxkit.yaml with only the keys
# you want to change.
#
# VM list: if 'vms:' is present in your user config it replaces this
# list entirely — it is not merged. Define all VMs you want in one place.
#
# Security field:
#   security: ~         direct connection, no tunnel (local VMs)
#   security:
#     method: ssh_tunnel
#     key: ~/.ssh/keys/<machine>/<keyname>   (mesh/remote VMs)
#
# Example user override (~/.config/pxkit/pxkit.yaml):
#
#   pxkit:
#     proxmox:
#       host: 192.168.1.100
#     vms:
#       - name: My VM
#         vmid: 100
#         connection:
#           host: 192.168.1.100
#           port: ~
#           security: ~

pxkit:
  # Log verbosity: verbose | normal | quiet
  # verbose: DEBUG to file and console (full .vv content, API calls, keyring)
  # normal:  INFO to file, WARNING to console (default)
  # quiet:   WARNING to file only — no console output (recommended for autostart)
  # CLI flags -v / -q override this setting.
  log_level: normal

  proxmox:
    host: localhost
    port: 8006
    node: wcyjl1
    token_id: carolyn@pam!pxkit
    # token secret lives in kwallet only — never in this file

  vms:
    - name: Puppy Linux
      vmid: 100
      connection:
        host: localhost
        port: ~
        security: ~

    - name: Debian XFCE
      vmid: 101
      connection:
        host: localhost
        port: ~
        security: ~

    - name: Rocky Linux
      vmid: 102
      connection:
        host: localhost
        port: ~
        security: ~

    # Mesh VM example (ThinkCentre or other networked host) — uncomment and populate:
    # - name: ThinkCentre Debian
    #   vmid: 203
    #   connection:
    #     host: 192.168.x.x
    #     port: ~
    #     security:
    #       method: ssh_tunnel
    #       key: ~/.ssh/keys/thinkcentre/spice
