# nmkit.yaml - nmkit application configuration
#
# This file ships with nmkit and provides defaults.
# To override, create ~/.config/nmkit/nmkit.yaml with only the keys
# you want to change.
#
# Platform-specific settings (nxplayer path, open command, terminal)
# are in platform.yaml. Edit that file for path overrides.
#
# session_dir:
#   Directory where .nxs session files are written. Must be the
#   NoMachine session directory — nxplayer will not read files from
#   any other location. Tilde expansion is supported.
#
# ui:
#   title: window title shown in titlebar and taskbar
#
# log_level:
#   Controls console verbosity. One of: verbose, normal, quiet
#   File logging is always INFO regardless of this setting.
#
# Example user override (~/.config/nmkit/nmkit.yaml):
#
#   nmkit:
#     ui:
#       title: Acme Remote Launcher
#     log_level: quiet

nmkit:
  session_dir: ~/Documents/NoMachine

  ui:
    title: NX Launcher

  log_level: normal
